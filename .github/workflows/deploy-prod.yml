name: Deploy — Production

# on:
#   push:
#     branches: [main]
on: workflow_dispatch # temporarily disabled — uncomment above when ready to release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/swaptune-backend

jobs:
  # ── Backend: build + push production Docker image ─────────────
  backend-docker:
    name: Build & Push Docker Image (prod)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Deploy step ───────────────────────────────────────────
      # Uncomment once you pick a hosting platform (see deploy-dev.yml comments)
      # Use secrets: RAILWAY_TOKEN_PROD / RENDER_DEPLOY_HOOK_PROD / PROD_HOST etc.

  # ── Flutter: build release APK + upload as artifact ───────────
  flutter-release-apk:
    name: Flutter — Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: swaptune-release-${{ github.sha }}
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
