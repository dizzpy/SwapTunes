name: Deploy — Dev

# on:
#   push:
#     branches: [dev]
#     paths:
#       - "backend/**" # only run when backend code changes
on: workflow_dispatch # temporarily disabled — uncomment above when ready to release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/swaptune-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # auto-provided, no setup needed

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

