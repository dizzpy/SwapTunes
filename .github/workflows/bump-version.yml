name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump version & push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get current version from pubspec.yaml
        id: current
        run: |
          VERSION=$(grep "^version:" frontend/pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD=$(grep "^version:" frontend/pubspec.yaml | sed 's/.*+//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: bump
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.VERSION }}"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_BUILD=$(( ${{ steps.current.outputs.BUILD }} + 1 ))
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "NEW_BUILD=$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.bump.outputs.NEW_VERSION }}+${{ steps.bump.outputs.NEW_BUILD }}/" \
              frontend/pubspec.yaml

      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/pubspec.yaml
          git commit -m "chore: bump version to v${{ steps.bump.outputs.NEW_VERSION }}"
          git tag "v${{ steps.bump.outputs.NEW_VERSION }}"
          git push origin HEAD:main --tags
