name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  backend-lint:
    name: Gate — Backend Lint & Format
    uses: ./.github/workflows/_backend-ci.yml

  flutter-analyze:
    name: Flutter — Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
        continue-on-error: true

  flutter-build-android:
    name: Flutter — Build Android APK (smoke check)
    runs-on: ubuntu-latest
    needs: flutter-analyze
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Create .env file
        run: |
          cat > .env << EOF
          SUPABASE_URL=https://placeholder.supabase.co
          SUPABASE_ANON_KEY=placeholder
          SUPABASE_REDIRECT_SCHEME=io.supabase.swaptune
          SUPABASE_REDIRECT_URL=io.supabase.swaptune://login-callback
          BACKEND_URL=https://placeholder.dev/api/v1
          EOF
      - run: flutter build apk --debug
