name: CI

# on:
#   pull_request:
#     branches: [main, dev]
on: workflow_dispatch # temporarily disabled — uncomment above when ready to release

jobs:
  # ── Backend: lint + format check ──────────────────────────────
  backend-lint:
    name: Backend — Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,json}"

  # ── Flutter: analyze ──────────────────────────────────────────
  flutter-analyze:
    name: Flutter — Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get packages
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
        continue-on-error: true # no tests written yet — won't fail CI

  # ── Flutter: build Android debug APK (smoke check) ────────────
  flutter-build-android:
    name: Flutter — Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-analyze
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get packages
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
